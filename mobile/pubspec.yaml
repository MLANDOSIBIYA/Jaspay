  local_auth: ^3.0.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_nfc_kit: ^3.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
